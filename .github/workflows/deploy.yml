name: CD Pipeline - Auto Deploy to AWS EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Deploy to AWS EC2 via Secure SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 13.60.230.184
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo apt update && sudo apt install -y docker.io
          sudo systemctl stop nginx || true
          sudo docker stop web-app || true
          sudo docker rm web-app || true
          sudo docker run -d --name web-app -p 80:80 nginx:alpine
          sudo docker exec web-app sh -c 'echo "<h1>Ibrahim Final DevOps Project Automated Via GitHub Actions CI/CD Loop!</h1>" > /usr/share/nginx/html/index.html'
